<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game - Landing Page Replica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="faded-text">SQUID</div>
    
    <div class="hero-image-wrapper">
        <img src="assets/character.png" alt="Squid Game Guard" class="hero-image-bg">
        <div class="hero-image-gradient"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <img src="assets/logo.png" alt="Squid Game Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="#">About</a></li>
                    <li><a href="#" class="active">Watch now</a></li>
                    <li><a href="#">Actors</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div class="menu-btn">
                <i class="ri-menu-line"></i>
            </div>
        </header>

        <main>
            <div class="content-left">
                <div class="main-title">
                    <img src="assets/logo.png" alt="Squid Game" class="title-logo">
                
                </div>
                
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>

                <div class="actions">
                    <button class="btn btn-primary">
                        <i class="ri-play-circle-line"></i> Play Now
                    </button>
                    <button class="btn btn-secondary">
                        <i class="ri-play-fill"></i> Watch Trailer
                    </button>
                </div>
            </div>
            
            <div class="scroll-indicator">
                <span class="scroll-text">SCROLL</span>
                <div class="line"></div>
            </div>

            <div class="social-links">
                <a href="#"><i class="ri-twitter-x-line"></i></a>
                <a href="#"><i class="ri-instagram-line"></i></a>
                <a href="#"><i class="ri-facebook-circle-line"></i></a>
            </div>
        </main>

        <div class="episodes-section">
            <div class="faded-bg-text">GAME</div>
            <div class="episodes-cards">
                <div class="card">
                    <img src="assets/img1.jpeg" alt="Episode 1">
                    <div class="card-play"><i class="ri-play-fill"></i></div>
                </div>
                <div class="card">
                    <img src="assets/img2.jpeg" alt="Episode 2">
                    <div class="card-play"><i class="ri-play-fill"></i></div>
                </div>
                <div class="card">
                    <img src="assets/img3.jpeg" alt="Episode 3">
                    <div class="card-play"><i class="ri-play-fill"></i></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
